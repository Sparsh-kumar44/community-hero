steps:
  # 1. Build the container image with VITE build arguments
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/community-hero'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg'
      - 'VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID'
      - '--build-arg'
      - 'VITE_FIREBASE_MEASUREMENT_ID=$_VITE_FIREBASE_MEASUREMENT_ID'
      - '--build-arg'
      - 'VITE_GOOGLE_MAPS_API_KEY=$_VITE_GOOGLE_MAPS_API_KEY'
      - '--build-arg'
      - 'VITE_API_URL=$_VITE_API_URL'
      - '.'

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/community-hero']

  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'community-hero'
      - '--image'
      - 'gcr.io/$PROJECT_ID/community-hero'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'

images:
  - 'gcr.io/$PROJECT_ID/community-hero'

substitutions:
  _VITE_FIREBASE_API_KEY: 'your_firebase_api_key'
  _VITE_FIREBASE_AUTH_DOMAIN: 'your_firebase_auth_domain'
  _VITE_FIREBASE_PROJECT_ID: 'your_firebase_project_id'
  _VITE_FIREBASE_STORAGE_BUCKET: 'your_firebase_storage_bucket'
  _VITE_FIREBASE_MESSAGING_SENDER_ID: 'your_firebase_messaging_sender_id'
  _VITE_FIREBASE_APP_ID: 'your_firebase_app_id'
  _VITE_FIREBASE_MEASUREMENT_ID: 'your_firebase_measurement_id'
  _VITE_GOOGLE_MAPS_API_KEY: 'your_google_maps_api_key'
  _VITE_API_URL: 'https://community-hero-xyz-uc.a.run.app'
